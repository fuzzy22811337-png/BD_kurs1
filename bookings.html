<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RegPorts — Бронь портов</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- ===== Навбар ===== -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-logo">RegPorts</a>

    <div class="nav-links">
      <a href="index.html"    class="nav-link">Главная</a>
      <a href="bookings.html" class="nav-link active">Бронь портов</a>
      <a href="devices.html"  class="nav-link">Устройства</a>
    </div>

    <button class="btn-logout" onclick="logout()">Выйти</button>

    <div class="nav-account" id="nav-account">
      <button class="btn-account" id="btn-account" onclick="toggleAccountDropdown()">
        <span id="account-nickname">Загрузка…</span>
      </button>

      <div class="account-dropdown hidden" id="account-dropdown">
        <div class="account-scroll">
          <div class="account-info">
            <div class="account-info-row">
              <span class="info-label">Никнейм</span>
              <span class="info-value" id="info-nickname">—</span>
            </div>
            <div class="account-info-row">
              <span class="info-label">Телефон</span>
              <span class="info-value" id="info-tele">—</span>
            </div>
            <div class="account-info-row">
              <span class="info-label">ФИО</span>
              <span class="info-value" id="info-fio">—</span>
            </div>
          </div>

          <div class="account-divider"></div>

          <div class="account-actions">
            <button class="btn-edit"   onclick="editAccount()">Редактировать</button>
            <button class="btn-delete" onclick="deleteAccount()">Удалить</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- ===== Карточка редактирования профиля (index.js) ===== -->
  <div class="modal-overlay hidden" id="edit-modal" onclick="handleEditOverlayClick(event)">
    <div class="edit-card" id="edit-card">
      <div class="edit-card-title">Редактирование профиля</div>
      <div class="edit-fields">
        <div class="edit-field">
          <label class="edit-label">Никнейм</label>
          <input class="edit-input" type="text" id="edit-nickname" placeholder="Никнейм">
        </div>
        <div class="edit-field">
          <label class="edit-label">Телефон</label>
          <input class="edit-input" type="tel" id="edit-tele" placeholder="Телефон">
        </div>
        <div class="edit-field">
          <label class="edit-label">ФИО</label>
          <input class="edit-input" type="text" id="edit-fio" placeholder="ФИО">
        </div>
        <div class="edit-field">
          <label class="edit-label">Новый пароль <span class="edit-label-hint">(оставьте пустым если не меняете)</span></label>
          <input class="edit-input" type="password" id="edit-password" placeholder="Новый пароль">
        </div>
      </div>
      <div class="edit-card-actions">
        <button class="edit-btn-confirm" onclick="submitEdit()">Далее</button>
        <button class="edit-btn-cancel"  onclick="closeEditModal()">Отмена</button>
      </div>
    </div>
  </div>

  <!-- ===== Таблица броней ===== -->
  <main class="page-body">
    <div class="page-header">
      <div class="page-title">Бронь портов</div>
      <button class="btn-add" onclick="addBooking()">+ Добавить бронь</button>
    </div>

    <div class="table-wrapper">
      <div class="table-scroll">
        <table id="bookings-table">
          <thead>
            <tr>

              <!-- Столбец действий -->
              <th style="width: 68px;"></th>

              <!-- ID брони -->
              <th>
                <div class="th-inner">
                  <div class="col-controls">
                    <button class="ctrl-btn active" id="sort-bk_id" title="Сортировать" onclick="handleSort('bk_id', this)">↑</button>
                    <button class="ctrl-btn" id="filter-bk_id" title="Фильтр" onclick="openFilter('bk_id', this)">⊟</button>
                  </div>
                  ID брони
                </div>
              </th>

              <!-- ID устройства -->
              <th>
                <div class="th-inner">
                  <div class="col-controls">
                    <button class="ctrl-btn" id="sort-device_id" title="Сортировать" onclick="handleSort('device_id', this)">↕</button>
                    <button class="ctrl-btn" id="filter-device_id" title="Фильтр" onclick="openFilter('device_id', this)">⊟</button>
                  </div>
                  ID устройства
                </div>
              </th>

              <!-- Устройство -->
              <th>
                <div class="th-inner">
                  <div class="col-controls">
                    <button class="ctrl-btn" id="sort-device_name" title="Сортировать" onclick="handleSort('device_name', this)">↕</button>
                    <button class="ctrl-btn" id="filter-device_name" title="Фильтр" onclick="openFilter('device_name', this)">⊟</button>
                  </div>
                  Устройство
                </div>
              </th>

              <!-- Бронирование -->
              <th>
                <div class="th-inner">
                  <div class="col-controls">
                    <button class="ctrl-btn" id="sort-booking_time" title="Сортировать" onclick="handleSort('booking_time', this)">↕</button>
                  </div>
                  Бронирование
                </div>
              </th>

              <!-- ID порта -->
              <th>
                <div class="th-inner">
                  <div class="col-controls">
                    <button class="ctrl-btn" id="sort-port_id" title="Сортировать" onclick="handleSort('port_id', this)">↕</button>
                    <button class="ctrl-btn" id="filter-port_id" title="Фильтр" onclick="openFilter('port_id', this)">⊟</button>
                  </div>
                  ID порта
                </div>
              </th>

              <!-- Порт -->
              <th>
                <div class="th-inner">
                  <div class="col-controls">
                    <button class="ctrl-btn" id="sort-port_name" title="Сортировать" onclick="handleSort('port_name', this)">↕</button>
                    <button class="ctrl-btn" id="filter-port_name" title="Фильтр" onclick="openFilter('port_name', this)">⊟</button>
                  </div>
                  Порт
                </div>
              </th>

              <!-- Описание порта -->
              <th>
                <div class="th-inner">Назначение порта</div>
              </th>

            </tr>
          </thead>

          <tbody id="bookings-body">
            <tr>
              <td colspan="8">
                <div class="table-state">
                  <div class="spinner"></div>
                  Загрузка…
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- ===== Карточка фильтра ===== -->
  <div class="filter-card hidden" id="filter-card">
    <div class="filter-card-label" id="filter-card-label">Фильтр</div>
    <input type="text" id="filter-input" placeholder="Введите значение…">
    <div class="filter-card-actions">
      <button class="btn-filter-find"   onclick="applyFilter()">Найти</button>
      <button class="btn-filter-cancel" onclick="closeFilter()">Отмена</button>
    </div>
  </div>

  <!-- ===== Карточка добавления/редактирования брони ===== -->
  <div class="modal-overlay hidden" id="booking-modal" onclick="handleBookingOverlayClick(event)">
    <div class="edit-card" id="booking-card">
      <div class="edit-card-title" id="booking-modal-title">Добавить бронь</div>
      <div class="edit-fields">

        <div class="edit-field">
          <label class="edit-label">ID устройства</label>
          <input class="edit-input booking-input" type="number" id="booking-device-id" placeholder="Введите ID устройства…" min="1">
        </div>

        <div class="edit-field">
          <label class="edit-label">Время бронирования</label>
          <div class="time-inputs-row">
            <div class="time-input-group">
              <input class="edit-input time-input" type="number" id="booking-days" placeholder="0" min="0">
              <span class="time-input-label">Дней</span>
            </div>
            <div class="time-input-group">
              <input class="edit-input time-input" type="number" id="booking-hours" placeholder="0" min="0" max="23">
              <span class="time-input-label">Часов</span>
            </div>
            <div class="time-input-group">
              <input class="edit-input time-input" type="number" id="booking-minutes" placeholder="0" min="0" max="59">
              <span class="time-input-label">Минут</span>
            </div>
          </div>
        </div>

        <div class="edit-field">
          <label class="edit-label">ID порта</label>
          <input class="edit-input booking-input" type="number" id="booking-port-id" placeholder="Введите ID порта…" min="1">
        </div>

      </div>
      <div class="edit-card-actions">
        <button class="edit-btn-confirm" id="booking-modal-confirm" onclick="submitBooking()">Добавить</button>
        <button class="edit-btn-cancel" onclick="closeBookingModal()">Отмена</button>
      </div>
    </div>
  </div>

  <!-- index.js первым - общий код (авторизация, навбар, профиль) -->
  <script src="index.js"></script>
  <!-- bookings.js - специфичный код  -->
  <script src="bookings.js"></script>
</body>
</html>
